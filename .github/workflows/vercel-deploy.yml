name: AgentOS - CI/CD

on:
  push:
    branches:
      - main
  pull_request:name: Deploy para Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy na Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel --prod --token=$VERCEL_TOKEN

    branches:
      - main

jobs:
  test-build:
    name: 🏗️ Testando Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]  # Testa em múltiplas versões

    steps:
      - name: 🔄 Checkout do Código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Instalar Dependências
        run: npm install --force

      - name: 🏗️ Rodar Build
        run: npm run build

      - name: ✅ Teste de Build Concluído
        run: echo "Build test passed! ✅"

  deploy:
    name: 🚀 Deploy na Vercel
    runs-on: ubuntu-latest
    needs: test-build
    if: github.event_name == 'push'

    steps:
      - name: 🔄 Checkout do Código
        uses: actions/checkout@v4

      - name: ⚙️ Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: 🔑 Autenticar na Vercel
        run: vercel login --token ${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Fazer Deploy
        run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }}

      - name: ✅ Deploy Concluído
        run: echo "Deploy finalizado com sucesso! 🎉"

  notify:
    name: 📩 Notificar Erro
    runs-on: ubuntu-latest
    needs: [test-build, deploy]
    if: failure()

    steps:
      - name: ❌ Notificação de Erro
        run: echo "🚨 O build ou o deploy falhou! Verifique os logs."


name: Deploy para Vercel 🚀

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Checkout do Código
        uses: actions/checkout@v4

      - name: 🛠️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 📂 Entrar na pasta correta
        run: |
          cd frontend
          npm install

      - name: 🔍 Verificar Dependências
        run: |
          cd frontend
          npm audit --production || echo "⚠️ Aviso: Dependências com avisos, mas continuando..."

      - name: 🏗️ Rodar Build
        run: |
          cd frontend
          npm run build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Checkout do Código
        uses: actions/checkout@v4

      - name: 📂 Entrar na pasta correta
        run: |
          cd frontend
          npm install

      - name: 📦 Instalar Vercel CLI
        run: npm install -g vercel

      - name: 🔑 Configurar Vercel Auth
        run: vercel login --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Fazer Deploy na Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd frontend
          vercel --prod --token=$VERCEL_TOKEN

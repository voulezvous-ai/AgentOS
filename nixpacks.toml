# Configuração do Nixpacks para Railway
# Este arquivo configura o processo de build e runtime para o AgentOS

[phases.setup]
nixPkgs = ["nodejs", "mongodb", "git", "nasm", "python3"]
nixLibs = ["openssl", "libuv", "zlib"]
cmds = ["echo 'AgentOS build process starting...'"]

[phases.install]
cmds = [
  "npm ci --production=false", 
  "cd services/websocket-service && npm ci --production=false",
  "cd ../vox-service && npm ci --production=false"
]
cacheDirectories = [
  "node_modules",
  "services/websocket-service/node_modules",
  "services/vox-service/node_modules"
]

[phases.build]
cmds = [
  "npm run build", 
  "cd services/websocket-service && npm run build",
  "cd ../vox-service && npm run build"
]
cacheDirectories = [
  "dist",
  "services/websocket-service/dist",
  "services/vox-service/dist"
]

[phases.test]
dependsOn = ["build"]
cmds = [
  "echo 'Skipping tests during deployment - they run in CI pipeline'"
]

[start]
cmd = "node services/websocket-service/cluster.js"
runImage = "node:18-slim"

[variables]
NODE_ENV = "production"
NODE_OPTIONS = "--max-old-space-size=512"
CLUSTER_MODE = "true"
WORKER_THREADS = "4"

[monitoring]
appType = "node.js"
enablePrometheus = true

[healthcheck]
command = "curl -f http://localhost:$PORT/status || exit 1"
interval = "30s"
timeout = "10s"
retries = 3
startPeriod = "60s"

[limits]
memory = "512Mi"
cpus = 1

[optimizations]
compress = true
minify = true

[metrics]
enabled = true
path = "/metrics"
portEnv = "PORT"

[autoscaling]
minReplicas = 1
maxReplicas = 10
metrics = [
  { type = "Resource", resource = { name = "cpu", targetAverageUtilization = 70 } },
  { type = "Resource", resource = { name = "memory", targetAverageUtilization = 80 } }
]
